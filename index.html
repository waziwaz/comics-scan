<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Manga Reader - Accueil</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="Oneshot_game_logo.png">
</head>
<body>
    <header>
        <h1>Ma Bibliothèque Manga</h1>
    </header>

    <main class="manga-grid" id="manga-catalogue"></main>

    <script>
        const baseDonneesMangas = [
            {
                id: "manyShot",
                nom: "ManyShot",
                description: "contient 3 histoire : Niko-kun fait la sieste, Jouets et Niko-kun, Niko après ça. Qui nous montrerons a quel poins Niko est un petit pervers ;)",
                personnages: "Niko, Dieu, Calamus, Alula",
                parodie: "One Shot", 
                categorie: "Hentai / Fantasy"
            },
        ];

        const container = document.getElementById('manga-catalogue');

        async function genererCatalogue() {
            for (const manga of baseDonneesMangas) {
                const coverUrl = `couvertures/${manga.id}Cover.png`;
                
                // --- NOUVEAU : On compte les pages avant d'afficher ---
                const nbPages = await compterPages(manga.id);
                
                const card = document.createElement('a');
                card.href = `lecture.html?manga=${manga.id}`;
                card.className = 'manga-card';
                
                card.innerHTML = `
                    <img src="${coverUrl}" alt="Manga ${manga.nom} VF">
                    
                    <div class="manga-tooltip">
                        <h4>${manga.nom}</h4>
                        <p><strong>Description :</strong> ${manga.description}</p>
                        <p><strong>Persos :</strong> ${manga.personnages}</p>
                        <p><strong>Type :</strong> ${manga.parodie === "Original" ? "✨ Œuvre Originale" : "🎭 Parodie de " + manga.parodie}</p>
                        <span class="badge">${manga.categorie}</span>
                    </div>

                    <div class="info">
                        <h3>${manga.nom}</h3>
                        <p class="page-count">${nbPages} pages</p> </div>
                `;
                container.appendChild(card);
            }
        }
        async function compterPages(manga) {
            let count = 0;
            let exist = true;
            while (exist && count < 200) { // Sécurité à 200 pages
                const testImg = `scans/${manga}/${manga}-page-${count + 1}-vf.png`;
                try {
                    const res = await fetch(testImg, { method: 'HEAD' });
                    if (res.ok) count++;
                    else exist = false;
                } catch { exist = false; }
            }
            return count;
        }

        genererCatalogue();
    </script>
</body>
</html>
